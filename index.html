<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escáner DNI Pro</title>
    <meta name="description" content="Escanea la parte de adelante y atrás de tu tarjeta para generar un PDF fácilmente.">
    <link rel="stylesheet" href="styles.css?v=5">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- jsPDF  -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Cropper.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Escáner de Tarjetas</h1>
            <p>Captura ADELANTE y ATRÁS para tu PDF</p>
        </header>

        <main>
            <!-- Interface for Camera -->
            <section class="camera-section" id="cameraSection">
                <div class="video-container">
                    <video id="cameraStream" autoplay playsinline></video>
                </div>
                
                <div class="capture-controls">
                    <button class="btn btn-primary btn-circular" id="captureBtn" aria-label="Capturar foto">
                        <span class="btn-icon"></span>
                    </button>
                    <p id="captureInstruction" class="instruction-text">Capturar Adelante</p>
                </div>
            </section>

            <!-- Editor Modal (Cropper under demand) -->
            <section class="cropper-section hidden" id="cropperSection">
                <div class="cropper-wrapper">
                    <img id="cropperImage" src="" alt="Edición de recorte" />
                </div>
                <p class="instruction-text" style="text-align: center; margin-bottom:10px;">Ajusta el recuadro</p>
                <div class="action-buttons">
                    <button class="btn btn-secondary" id="cancelCropBtn">Cancelar</button>
                    <button class="btn btn-primary" id="confirmCropBtn">Guardar</button>
                </div>
            </section>

            <!-- Gallery / Preview Section -->
            <section class="preview-section hidden" id="previewSection">
                <h2>Revisión</h2>
                <div class="images-container">
                    <div class="image-box" id="frontPreviewBox" title="Toca para recortar">
                        <img id="frontImage" src="" alt="Adelante de la tarjeta" class="hidden clickable-image">
                        <div class="placeholder active" id="frontPlaceholder">Adelante</div>
                        <button class="btn-retake hidden" id="retakeFront" aria-label="Volver a tomar adelante">↻</button>
                    </div>
                    <div class="image-box" id="backPreviewBox" title="Toca para recortar">
                        <img id="backImage" src="" alt="Atrás de la tarjeta" class="hidden clickable-image">
                        <div class="placeholder active" id="backPlaceholder">Atrás</div>
                        <button class="btn-retake hidden" id="retakeBack" aria-label="Volver a tomar atrás">↻</button>
                    </div>
                </div>

                <div class="document-details">
                    <label for="fileName">Nombre del archivo (PDF)</label>
                    <input type="text" id="fileName" placeholder="Ej: DNI_Juan_Perez" value="Mi_Documento">
                </div>

                <div class="action-buttons-wrap">
                    <div class="action-buttons">
                        <button class="btn btn-secondary" id="generatePdfBtn" disabled>Ver PDF</button>
                        <button class="btn btn-primary" id="sharePdfBtn" disabled>Compartir</button>
                    </div>
                </div>
            </section>

            <!-- Canvas (hidden) used to capture frames -->
            <canvas id="captureCanvas" class="hidden"></canvas>
        </main>
    </div>

    <!-- Error Modal -->
    <div class="modal hidden" id="errorModal">
        <div class="modal-content">
            <h3>Error</h3>
            <p id="errorMessage"></p>
            <button class="btn btn-primary" id="closeModalBtn">Entendido</button>
        </div>
    </div>

    <!-- Cropper.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="app.js?v=10"></script>
</body>
</html>
